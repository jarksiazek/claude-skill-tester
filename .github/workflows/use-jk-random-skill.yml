name: Use jk-random Skill

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
    inputs:
      min_value:
        description: 'Minimum random number (default: 1)'
        required: false
        default: '1'
      max_value:
        description: 'Maximum random number (default: 100)'
        required: false
        default: '100'

jobs:
  random-number:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generate random number (default range)
        if: github.event_name != 'workflow_dispatch'
        run: |
          python .claude/skills/jk-random/scripts/generate_number.py

      - name: Generate random number (custom range)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python .claude/skills/jk-random/scripts/generate_number.py ${{ github.event.inputs.min_value }} ${{ github.event.inputs.max_value }}

      - name: Generate random number and capture output
        id: random
        run: |
          OUTPUT=$(python .claude/skills/jk-random/scripts/generate_number.py 1 1000)
          echo "random_output=$OUTPUT" >> $GITHUB_OUTPUT
          # Extract the number from the output
          NUMBER=$(echo "$OUTPUT" | grep -oP '\d+(?!.*\d)')
          echo "random_number=$NUMBER" >> $GITHUB_OUTPUT

      - name: Use random number in workflow
        run: |
          echo "Generated random number: ${{ steps.random.outputs.random_number }}"
          echo "Full output: ${{ steps.random.outputs.random_output }}"
          # You can use the random number for various purposes here
          # Examples:
          # - Randomly select which tests to run
          # - Randomly assign workload
          # - Create variable seeding

  test-with-random-seed:
    runs-on: ubuntu-latest
    needs: random-number
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run tests with random seed
        run: |
          RANDOM_SEED=$(python .claude/skills/jk-random/scripts/generate_number.py 1 999999 | grep -oP '\d+(?!.*\d)')
          echo "Using random seed: $RANDOM_SEED"
          # Run your tests with the random seed
          # Example: pytest --randomly-seed=$RANDOM_SEED
